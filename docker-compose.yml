version: '3.8'

services:
  anior:
    image: mayziran/anior:latest
    container_name: anior
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "5000:5000"
    volumes:
      # 修改为你的视频目录
      - /你的视频目录:/data
      # 配置文件持久化
      - ./config:/app/config
    environment:
      - TZ=Asia/Shanghai
      # 设置管理员密码（不设置则无需登录）
      - ADMIN_PASSWORD=your_password_here
      # 用于签名 session，建议使用随机字符串
      - SECRET_KEY=your_random_secret_key_here
